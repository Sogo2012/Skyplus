# cloudbuild.yaml
# Google Cloud Build — pipeline de CI/CD para SkyPlus
# Uso: gcloud builds submit --config cloudbuild.yaml
# =============================================================================

steps:
  # 1. Build de la imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/skyplus:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/skyplus:latest'
      - '.'
    timeout: '1200s'   # 20 min — EnergyPlus es grande

  # 2. Push al Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/skyplus:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/skyplus:latest'

  # 3. Deploy a Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'skyplus'
      - '--image=gcr.io/$PROJECT_ID/skyplus:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=600'
      - '--concurrency=5'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=ENERGYPLUS_EXEC=/usr/local/bin/energyplus'

images:
  - 'gcr.io/$PROJECT_ID/skyplus:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/skyplus:latest'

timeout: '1800s'
